name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: hostman-linux-x64
            cmake_opts: -DHOSTMAN_USE_TUI=ON
          - os: macos-latest
            artifact_name: hostman-macos-arm64
            cmake_opts: -DHOSTMAN_USE_TUI=ON

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev libsqlite3-dev libssl-dev pkg-config libcjson-dev libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake curl openssl sqlite cjson ncurses pkg-config

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          cd build
          cmake \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)/opt/openssl@3;$(brew --prefix)" \
            -DCMAKE_LIBRARY_PATH="$(brew --prefix)/lib;$(brew --prefix)/opt/curl/lib;$(brew --prefix)/opt/openssl@3/lib;$(brew --prefix)/opt/cjson/lib" \
            -DCMAKE_INCLUDE_PATH="$(brew --prefix)/include;$(brew --prefix)/opt/curl/include;$(brew --prefix)/opt/openssl@3/include;$(brew --prefix)/opt/cjson/include" \
            -DCMAKE_C_FLAGS="-I$(brew --prefix)/opt/cjson/include" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$(brew --prefix)/opt/cjson/lib" \
            ${{ matrix.cmake_opts }} ..

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          cd build
          cmake ${{ matrix.cmake_opts }} ..

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Create artifact
        run: |
          mkdir -p artifact
          mkdir -p dist/${{ matrix.artifact_name }}
          cp build/hostman dist/${{ matrix.artifact_name }}/hostman
          chmod +x dist/${{ matrix.artifact_name }}/hostman
          cp LICENSE dist/${{ matrix.artifact_name }}/LICENSE
          cp README.md dist/${{ matrix.artifact_name }}/README.md
          cp CHANGELOG.md dist/${{ matrix.artifact_name }}/CHANGELOG.md
          cp BUILD.md dist/${{ matrix.artifact_name }}/BUILD.md
          tar -czf artifact/${{ matrix.artifact_name }}.tar.gz -C dist ${{ matrix.artifact_name }}

      - name: Upload artifact
        if: "${{ github.token != '' }}"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact/*.tar.gz
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANGELOG=$(sed -n "/^## $VERSION/,/^## /p" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changelog entry found for version $VERSION"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            Download the appropriate binary for your platform.
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            artifacts/hostman-linux-x64/hostman-linux-x64.tar.gz
            artifacts/hostman-macos-arm64/hostman-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
