name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: hostman-linux-x64
            cmake_opts: -DHOSTMAN_USE_TUI=OFF
          - os: ubuntu-latest
            artifact_name: hostman-linux-x64-tui
            cmake_opts: -DHOSTMAN_USE_TUI=ON
          - os: macos-latest
            artifact_name: hostman-macos-arm64
            cmake_opts: -DHOSTMAN_USE_TUI=OFF
          - os: macos-latest
            artifact_name: hostman-macos-arm64-tui
            cmake_opts: -DHOSTMAN_USE_TUI=ON
          - os: windows-latest
            artifact_name: hostman-windows-x64
            cmake_opts: -DHOSTMAN_USE_TUI=OFF -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev libsqlite3-dev libssl-dev pkg-config libcjson-dev libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake curl openssl sqlite cjson ncurses

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          cd build
          cmake \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)/opt/openssl@3;$(brew --prefix)" \
            -DCMAKE_LIBRARY_PATH="$(brew --prefix)/lib;$(brew --prefix)/opt/curl/lib;$(brew --prefix)/opt/openssl@3/lib" \
            -DCMAKE_INCLUDE_PATH="$(brew --prefix)/include;$(brew --prefix)/opt/curl/include;$(brew --prefix)/opt/openssl@3/include" \
            ${{ matrix.cmake_opts }} ..

      - name: Configure CMake (Other)
        if: runner.os != 'macOS'
        run: |
          mkdir -p build
          cd build
          cmake ${{ matrix.cmake_opts }} ..

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: microsoft/setup-msvc@v1
        with:
          arch: x64
          vcpkg: true

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Create artifact
        run: |
          mkdir -p artifact
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/hostman.exe artifact/hostman.exe
          else
            cp build/hostman artifact/hostman
          fi

      - name: Upload artifact
        if: "${{ github.token != '' }}"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact/*
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANGELOG=$(sed -n "/^## $VERSION/,/^## /p" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changelog entry found for version $VERSION"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            Download the appropriate binary for your platform.
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            artifacts/hostman-linux-x64/hostman
            artifacts/hostman-linux-x64-tui/hostman
            artifacts/hostman-macos-arm64/hostman
            artifacts/hostman-macos-arm64-tui/hostman
            artifacts/hostman-windows-x64/hostman.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
